<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLINKO — Drop & Win</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070f;
  --surface: #0f0f1a;
  --surface2: #161620;
  --border: rgba(255,255,255,0.06);
  --accent: #f0c040;
  --accent2: #e05c2a;
  --green: #2ecc71;
  --red: #e74c3c;
  --blue: #3b82f6;
  --text: #f0ece0;
  --muted: #555;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Space Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle at 20% 20%, rgba(240,192,64,0.04) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(224,92,42,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

#app { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 14px; display: grid; grid-template-columns: 250px 1fr 230px; gap: 12px; min-height: 100vh; }

#header { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding: 6px 0 8px; border-bottom: 0.5px solid var(--border); margin-bottom: 2px; }
#logo { font-family: var(--font-display); font-size: 48px; letter-spacing: 6px; line-height: 1; }
#logo .p1 { color: #f43f5e; } #logo .p2 { color: #f97316; }
#logo .p3 { color: #eab308; } #logo .p4 { color: #22c55e; }
#logo .p5 { color: #3b82f6; } #logo .p6 { color: #a855f7; }
#balance-wrap { display: flex; gap: 20px; align-items: center; }
.bal-box { text-align: right; }
.bal-box .lbl { font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
.bal-box .amt { font-family: var(--font-display); font-size: 30px; color: var(--accent); }

.panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; }
.panel-label { font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }

#left-panel { display: flex; flex-direction: column; gap: 10px; }

#risk-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.risk-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 4px; text-align: center; font-family: var(--font-body); font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted); transition: all 0.18s; }
.risk-btn .risk-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.risk-btn.active[data-risk="low"]  { border-color: #22c55e; background: #22c55e18; color: #22c55e; box-shadow: 0 0 14px #22c55e33; }
.risk-btn.active[data-risk="med"]  { border-color: #eab308; background: #eab30818; color: #eab308; box-shadow: 0 0 14px #eab30833; }
.risk-btn.active[data-risk="high"] { border-color: #ef4444; background: #ef444418; color: #ef4444; box-shadow: 0 0 14px #ef444433; }

#bet-display { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
#bet-display input { background: none; border: none; outline: none; font-family: var(--font-display); font-size: 30px; color: var(--accent); width: 130px; }
#bet-display .coin { font-size: 10px; color: var(--muted); }
.bet-quick { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; }
.qbtn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; padding: 6px 2px; text-align: center; font-size: 10px; cursor: pointer; color: var(--muted); transition: all 0.12s; font-family: var(--font-body); }
.qbtn:hover { color: var(--accent); border-color: var(--accent); background: rgba(240,192,64,0.08); }

#drop-btn { background: var(--accent); border: none; border-radius: 10px; padding: 15px; font-family: var(--font-display); font-size: 30px; letter-spacing: 3px; color: #000; cursor: pointer; width: 100%; transition: all 0.12s; box-shadow: 0 0 24px rgba(240,192,64,0.35); }
#drop-btn:hover { background: #f8d468; transform: translateY(-2px); box-shadow: 0 0 32px rgba(240,192,64,0.5); }
#drop-btn:active { transform: translateY(1px); box-shadow: none; }

#auto-row { display: flex; align-items: center; gap: 10px; }
#auto-row label { font-size: 11px; color: var(--muted); flex: 1; }
#auto-toggle { width: 40px; height: 22px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 11px; cursor: pointer; position: relative; transition: background 0.2s; }
#auto-toggle.on { background: var(--accent); }
#auto-toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
#auto-toggle.on::after { left: 21px; }

.stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-row .s-label { color: var(--muted); }
.stat-row .s-val { font-weight: 700; }
.s-val.green { color: var(--green); } .s-val.red { color: var(--red); }

#centre-panel { display: flex; flex-direction: column; gap: 10px; }
#canvas-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 8px; position: relative; overflow: hidden; }
#plinko-canvas { display: block; width: 100%; border-radius: 8px; }

#buckets-row { display: flex; gap: 3px; padding: 0 8px; }
.bucket { flex: 1; text-align: center; border-radius: 6px; padding: 5px 2px; font-family: var(--font-display); font-size: 13px; cursor: default; transition: transform 0.15s, box-shadow 0.15s; }

#chat-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
#chat-header { padding: 10px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
#chat-header .ch-title { font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; flex: 1; }
#online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
#online-count { font-size: 10px; color: var(--green); }
#chat-messages { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; max-height: 200px; }
#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.chat-msg { padding: 5px 8px; border-radius: 7px; font-size: 11px; line-height: 1.55; border: 0.5px solid transparent; animation: msgIn 0.25s ease; }
@keyframes msgIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
.chat-msg.highlight { border-color: var(--msg-color, #fff3); background: color-mix(in srgb, var(--msg-color, #fff) 12%, transparent); box-shadow: 0 0 12px color-mix(in srgb, var(--msg-color, #fff) 25%, transparent); }
.chat-msg .cn { font-weight: 700; margin-right: 4px; }
.chat-msg .ct { color: #888; }
.chat-msg.highlight .ct { color: #ddd; }

#right-panel { display: flex; flex-direction: column; gap: 10px; }

#jackpot-panel { background: var(--surface); border: 1px solid rgba(240,192,64,0.25); border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 0 30px rgba(240,192,64,0.08); }
#jackpot-panel .jlabel { font-size: 9px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
#jackpot-amount { font-family: var(--font-display); font-size: 38px; color: var(--accent); line-height: 1; animation: pulseJ 2s ease-in-out infinite; }
@keyframes pulseJ { 0%,100% { text-shadow: 0 0 20px rgba(240,192,64,0.6); } 50% { text-shadow: 0 0 6px rgba(240,192,64,0.2); } }
#jackpot-panel .jlast { font-size: 10px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

#streak-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; }
#streak-dots { display: flex; gap: 5px; justify-content: center; margin: 8px 0 6px; flex-wrap: wrap; }
.sdot { width: 18px; height: 18px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border); transition: all 0.2s; }
.sdot.filled { border-color: transparent; box-shadow: 0 0 8px currentColor; }
#streak-label { font-size: 10px; color: var(--muted); text-align: center; }

#history-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
#history-list::-webkit-scrollbar { width: 3px; }
#history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.hist-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; background: var(--surface2); border-radius: 6px; font-size: 12px; border-left: 2px solid transparent; }

#win-flash { position: fixed; inset: 0; pointer-events: none; z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; }
#win-flash.show { opacity: 1; }
#win-flash .wf-inner { font-family: var(--font-display); font-size: 90px; letter-spacing: 6px; animation: wfAnim 0.7s ease forwards; }
@keyframes wfAnim { 0% { transform:scale(0.4); opacity:0; } 45% { transform:scale(1.1); opacity:1; } 100% { transform:scale(1); opacity:0; } }

@media (max-width: 820px) {
  #app { grid-template-columns: 1fr; }
  #right-panel { display: none; }
  #header { flex-direction: column; gap: 6px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">
      <span class="p1">P</span><span class="p2">L</span><span class="p3">I</span><span class="p4">N</span><span class="p5">K</span><span class="p6">O</span>
    </div>
    <div id="balance-wrap">
      <div class="bal-box">
        <div class="lbl">Balance</div>
        <div class="amt" id="bal-txt">1,000</div>
      </div>
      <div class="bal-box">
        <div class="lbl">Online</div>
        <div class="amt" style="color:#22c55e;font-size:22px;" id="online-num">247</div>
      </div>
    </div>
  </div>

  <!-- LEFT -->
  <div id="left-panel">
    <div class="panel">
      <div class="panel-label">Risk Level</div>
      <div id="risk-btns">
        <div class="risk-btn active" data-risk="low"><span class="risk-icon">🟢</span>LOW</div>
        <div class="risk-btn" data-risk="med"><span class="risk-icon">🟡</span>MED</div>
        <div class="risk-btn" data-risk="high"><span class="risk-icon">🔴</span>HIGH</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Bet Amount</div>
      <div id="bet-display">
        <input type="number" id="bet-input" value="50" min="1">
        <span class="coin">coins</span>
      </div>
      <div class="bet-quick">
        <div class="qbtn" onclick="adjBet(10)">+10</div>
        <div class="qbtn" onclick="adjBet(50)">+50</div>
        <div class="qbtn" onclick="adjBet(100)">+100</div>
        <div class="qbtn" onclick="adjBet(-0.5,true)">½</div>
        <div class="qbtn" onclick="adjBet(2,true)">2×</div>
        <div class="qbtn" onclick="setBetVal(1)">MIN</div>
        <div class="qbtn" onclick="setBetVal(Math.min(balance,500))">MAX</div>
        <div class="qbtn" onclick="setBetVal(Math.round(balance/2))">HALF</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Auto Drop</div>
      <div id="auto-row">
        <label>Drop automatically</label>
        <div id="auto-toggle" onclick="toggleAuto()"></div>
      </div>
    </div>

    <button id="drop-btn" onclick="dropBall()">DROP</button>

    <div class="panel">
      <div class="panel-label">Session Stats</div>
      <div class="stat-row"><span class="s-label">Drops</span><span class="s-val" id="stat-drops">0</span></div>
      <div class="stat-row"><span class="s-label">Won</span><span class="s-val green" id="stat-won">0</span></div>
      <div class="stat-row"><span class="s-label">Lost</span><span class="s-val red" id="stat-lost">0</span></div>
      <div class="stat-row"><span class="s-label">Net</span><span class="s-val" id="stat-net">0</span></div>
      <div class="stat-row"><span class="s-label">Best</span><span class="s-val" id="stat-best" style="color:var(--accent)">—</span></div>
    </div>
  </div>

  <!-- CENTRE -->
  <div id="centre-panel">
    <div id="canvas-wrap">
      <canvas id="plinko-canvas"></canvas>
    </div>
    <div id="buckets-row"></div>
    <div id="chat-panel">
      <div id="chat-header">
        <div id="online-dot"></div>
        <span id="online-count">247 online</span>
        <span class="ch-title" style="text-align:right;">Live Chat</span>
      </div>
      <div id="chat-messages"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right-panel">
    <div id="jackpot-panel">
      <div class="jlabel">★ Jackpot ★</div>
      <div id="jackpot-amount">50,000</div>
      <div class="jlast" id="jlast">Last hit: Player X won 1000×</div>
    </div>

    <div id="streak-panel">
      <div class="panel-label" style="text-align:center;">Streak Bonus</div>
      <div id="streak-dots"></div>
      <div id="streak-label">Drop 10× for a FREE drop!</div>
    </div>

    <div class="panel">
      <div class="panel-label">Recent Drops</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<div id="win-flash"><div class="wf-inner" id="wf-txt"></div></div>

<script>
const ROWS = 14;
const BALL_R = 7;
const PEG_R = 5;
const GRAVITY = 0.19;
const FRICTION = 0.994;
const BOUNCE  = 0.78;

const PEG_COLORS = [
  '#f43f5e','#ec4899','#d946ef','#a855f7','#8b5cf6',
  '#6366f1','#3b82f6','#06b6d4','#10b981','#84cc16',
  '#eab308','#f97316','#ef4444','#14b8a6','#0ea5e9',
  '#f472b6','#c084fc','#818cf8','#34d399','#fbbf24',
];

const BALL_COLORS = [
  '#f43f5e','#f97316','#eab308','#22c55e','#06b6d4',
  '#3b82f6','#a855f7','#ec4899','#10b981','#fbbf24',
];

const NAME_COLORS = [
  '#f43f5e','#f97316','#eab308','#22c55e','#06b6d4',
  '#3b82f6','#a855f7','#ec4899','#10b981','#fbbf24',
  '#e11d48','#ea580c','#d97706','#16a34a','#0891b2',
  '#2563eb','#9333ea','#db2777','#059669','#d97706',
];

const RISK_CONFIG = {
  low: {
    buckets: [0.5,1.0,1.2,1.5,2.0,3.0,5.0,10.0,5.0,3.0,2.0,1.5,1.2,1.0,0.5],
    colors:  ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#8b5cf6','#ec4899','#fbbf24','#ec4899','#8b5cf6','#06b6d4','#22c55e','#eab308','#f97316','#ef4444'],
    edge: 0.05
  },
  med: {
    buckets: [0.3,0.5,1.0,2.0,4.0,8.0,20.0,50.0,20.0,8.0,4.0,2.0,1.0,0.5,0.3],
    colors:  ['#dc2626','#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#fbbf24','#fbbf24','#fbbf24','#06b6d4','#22c55e','#eab308','#f97316','#ef4444','#dc2626'],
    edge: 0.08
  },
  high: {
    buckets: [0.2,0.3,0.5,1.0,2.0,5.0,0.2,1000.0,0.2,5.0,2.0,1.0,0.5,0.3,0.2],
    colors:  ['#7f1d1d','#991b1b','#dc2626','#ef4444','#f97316','#06b6d4','#991b1b','#fbbf24','#991b1b','#06b6d4','#f97316','#ef4444','#dc2626','#991b1b','#7f1d1d'],
    edge: 0.12
  }
};

const FAKE_NAMES = [
  'Lucky777','CryptoKing','NightOwl','FastHands','GoldenBoy',
  'StarPlayer','JackpotJoe','RiskyBiz','DiamondDave','MoonShot',
  'CashFlow','BigWinner','HotStreak','BetMaster','RainMaker',
  'Alex','Sam','Jordan','Chris','Morgan','Taylor','Casey','Riley',
];

const CHAT_TEMPLATES = [
  (n,m) => ({ msg:`just hit ${m}× 🔥 LETS GOOO`, hot: m >= 5 }),
  (n,m) => ({ msg:`${m}× again omg I can't stop`, hot: m >= 3 }),
  (_)   => ({ msg:`one more drop... one more...`, hot: false }),
  (_)   => ({ msg:`why does the ball always go left 😭`, hot: false }),
  (n,m) => ({ msg:`${m}× cash out!! yesss 🚀`, hot: m >= 10 }),
  (_)   => ({ msg:`this game is actually rigged lol`, hot: false }),
  (_)   => ({ msg:`just deposited 500 more coins 💸`, hot: false }),
  (n,m) => ({ msg:`JACKPOT ${m}× let's gooo 🎉🎉`, hot: m >= 50 }),
  (_)   => ({ msg:`come on jackpot... COME ON`, hot: false }),
  (_)   => ({ msg:`down 2000 coins but I feel it coming`, hot: false }),
  (n,m) => ({ msg:`${m}× hit! bought dinner with that`, hot: m >= 5 }),
  (_)   => ({ msg:`auto drop ON and watching 😈`, hot: false }),
];

const canvas = document.getElementById('plinko-canvas');
const ctx = canvas.getContext('2d');
let W, H, pegPositions, bucketPositions;
let balance = 1000;
let risk = 'low';
let autoMode = false, autoTimer = null;
let streak = 0, freeDrops = 0;
let sessionDrops=0, sessionWon=0, sessionLost=0, sessionNet=0, sessionBest=0;
let jackpot = 50000;
let balls = [];
let animRunning = false;
let ballColorIdx = 0;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth - 16;
  H = Math.min(W * 0.92, 500);
  canvas.width = W;
  canvas.height = H;
  buildLayout();
}

function buildLayout() {
  pegPositions = [];
  const padX = W * 0.065, padY = 32;
  const rowH = (H - padY * 2 - 36) / (ROWS - 1);
  let pegIdx = 0;
  for (let r = 0; r < ROWS; r++) {
    const count = r + 3;
    const rowW = W - padX * 2;
    const gap = rowW / (count - 1);
    const ox = (W - rowW) / 2;
    for (let c = 0; c < count; c++) {
      pegPositions.push({
        x: ox + c * gap,
        y: padY + r * rowH,
        color: PEG_COLORS[pegIdx % PEG_COLORS.length],
      });
      pegIdx++;
    }
  }
  const lastRow = pegPositions.slice(-(ROWS + 2));
  bucketPositions = lastRow.map(p => ({ x: p.x, y: H - 22 }));
  buildBucketRow();
}

function buildBucketRow() {
  const row = document.getElementById('buckets-row');
  const cfg = RISK_CONFIG[risk];
  row.innerHTML = '';
  cfg.buckets.forEach((m, i) => {
    const b = document.createElement('div');
    b.className = 'bucket';
    b.style.background = cfg.colors[i] + '22';
    b.style.border = `1px solid ${cfg.colors[i]}66`;
    b.style.color = cfg.colors[i];
    b.style.fontSize = m >= 100 ? '10px' : m >= 10 ? '11px' : '13px';
    b.textContent = m >= 1000 ? '1K×' : m + '×';
    row.appendChild(b);
  });
}

function drawBoard() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#07070f';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let gx = 0; gx < W; gx += 22) {
    for (let gy = 0; gy < H; gy += 22) {
      ctx.beginPath(); ctx.arc(gx, gy, 0.8, 0, Math.PI * 2); ctx.fill();
    }
  }

  pegPositions.forEach(p => {
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 13);
    grd.addColorStop(0, p.color + '55');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();

    ctx.beginPath(); ctx.arc(p.x - 1.2, p.y - 1.2, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff88'; ctx.fill();
  });

  const cfg = RISK_CONFIG[risk];
  bucketPositions.forEach((b, i) => {
    if (i >= cfg.colors.length) return;
    const bw = (bucketPositions[1]?.x - bucketPositions[0]?.x) * 0.82 || 22;
    ctx.fillStyle = cfg.colors[i] + '30';
    ctx.strokeStyle = cfg.colors[i] + 'aa';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.roundRect(b.x - bw / 2, b.y - 15, bw, 22, 4);
    ctx.fill(); ctx.stroke();
  });
}

function dropBall() {
  const betAmt = parseInt(document.getElementById('bet-input').value) || 0;
  const isFree = freeDrops > 0;
  if (!isFree && (betAmt < 1 || betAmt > balance)) return;
  if (!isFree) { balance -= betAmt; updateUI(); }
  else { freeDrops--; updateStreak(); }

  sessionDrops++;
  document.getElementById('stat-drops').textContent = sessionDrops;

  streak = (streak + 1) % 10;
  if (streak === 0) {
    freeDrops++;
    showFlash('FREE DROP!', '#06b6d4');
    addChat('System', 'got a FREE drop from 10× streak! 🎁', '#fbbf24', true);
  }
  updateStreak();

  const color = BALL_COLORS[ballColorIdx % BALL_COLORS.length];
  ballColorIdx++;

  balls.push({
    x: W / 2 + (Math.random() - 0.5) * 12,
    y: 16,
    vx: (Math.random() - 0.5) * 1.8,
    vy: 0.4,
    bet: isFree ? 0 : betAmt,
    color,
    trail: [],
    landed: false,
    done: false,
  });

  if (!animRunning) animate();
}

function animate() {
  animRunning = true;
  update();
  drawBoard();
  balls.forEach(drawBall);
  if (balls.length > 0) requestAnimationFrame(animate);
  else animRunning = false;
}

function update() {
  balls = balls.filter(b => !b.done);
  balls.forEach(b => {
    if (b.landed) return;
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 22) b.trail.shift();

    b.vy += GRAVITY;
    b.vx *= FRICTION;
    b.x += b.vx;
    b.y += b.vy;

    for (const p of pegPositions) {
      const dx = b.x - p.x, dy = b.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = BALL_R + PEG_R + 1;
      if (dist < minD && dist > 0.01) {
        const nx = dx / dist, ny = dy / dist;
        b.x = p.x + nx * minD;
        b.y = p.y + ny * minD;
        const dot = b.vx * nx + b.vy * ny;
        b.vx = (b.vx - 2 * dot * nx) * BOUNCE;
        b.vy = (b.vy - 2 * dot * ny) * BOUNCE;
        b.vx += (Math.random() - 0.5) * 1.6;
        if (b.vy < 0.5) b.vy = 0.5;
      }
    }

    if (b.x < BALL_R) { b.x = BALL_R; b.vx = Math.abs(b.vx) * 0.75; }
    if (b.x > W - BALL_R) { b.x = W - BALL_R; b.vx = -Math.abs(b.vx) * 0.75; }

    if (b.y > H - 38) {
      b.landed = true;
      landBall(b);
      setTimeout(() => { b.done = true; }, 500);
    }
  });
}

function drawBall(b) {
  if (b.done) return;
  b.trail.forEach((t, i) => {
    const progress = i / b.trail.length;
    const alpha = progress * 0.45;
    const r = BALL_R * progress * 0.75;
    ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    const hex = Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.fillStyle = b.color + hex; ctx.fill();
  });

  const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, BALL_R * 2.8);
  grd.addColorStop(0, b.color + 'aa');
  grd.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R * 2.8, 0, Math.PI * 2);
  ctx.fillStyle = grd; ctx.fill();

  ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = b.color; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(b.x - 2, b.y - 2, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
}

function landBall(b) {
  let minD = Infinity, bucketIdx = 0;
  bucketPositions.forEach((bp, i) => {
    const d = Math.abs(b.x - bp.x);
    if (d < minD) { minD = d; bucketIdx = i; }
  });

  const cfg = RISK_CONFIG[risk];
  const mult = cfg.buckets[bucketIdx];
  const color = cfg.colors[bucketIdx];
  const winAmt = Math.floor(b.bet * mult);
  balance += winAmt;
  updateUI();

  const profit = winAmt - b.bet;
  sessionNet += profit;
  if (profit > 0) {
    sessionWon += profit;
    document.getElementById('stat-won').textContent = sessionWon;
    if (winAmt > sessionBest) { sessionBest = winAmt; document.getElementById('stat-best').textContent = winAmt; }
  } else {
    sessionLost += Math.abs(profit);
    document.getElementById('stat-lost').textContent = sessionLost;
  }
  const netEl = document.getElementById('stat-net');
  netEl.textContent = (sessionNet >= 0 ? '+' : '') + sessionNet;
  netEl.className = 's-val ' + (sessionNet >= 0 ? 'green' : 'red');

  const bucketEls = document.getElementById('buckets-row').children;
  if (bucketEls[bucketIdx]) {
    const el = bucketEls[bucketIdx];
    el.style.transform = 'scale(1.2)';
    el.style.boxShadow = `0 0 16px ${color}`;
    setTimeout(() => { el.style.transform = ''; el.style.boxShadow = ''; }, 350);
  }

  const bp = bucketPositions[bucketIdx];
  if (bp) {
    ctx.beginPath(); ctx.arc(bp.x, bp.y - 6, 18, 0, Math.PI * 2);
    ctx.fillStyle = color + '66'; ctx.fill();
  }

  if (mult >= 1000) {
    jackpot += b.bet * 40;
    showFlash('JACKPOT!!!', '#fbbf24');
    document.getElementById('jlast').textContent = 'Just now — YOU won 1000×! 🎉';
    addChat('YOU', 'HIT THE JACKPOT 1000× !!! 🚀🚀🚀🎉', '#fbbf24', true);
  } else if (mult >= 10) {
    showFlash(mult + '×', color);
    addChat('You', `hit ${mult}× — won ${winAmt} coins! 🔥`, color, true);
  } else if (mult >= 3) {
    addChat('You', `${mult}× — nice one!`, color, false);
  }

  addHistory(mult, winAmt, b.bet, color);

  if (balance <= 0) {
    balance = 500; updateUI();
    showFlash('REFILL!', '#22c55e');
    addChat('System', 'You ran out! Here are 500 free coins 🎁', '#22c55e', true);
  }
}

function addHistory(mult, winAmt, bet, color) {
  const list = document.getElementById('history-list');
  const item = document.createElement('div');
  item.className = 'hist-item';
  item.style.borderLeftColor = color;
  const isWin = winAmt >= bet;
  item.innerHTML = `
    <span style="color:${color};font-weight:700;">${mult >= 1000 ? '1K' : mult}×</span>
    <span style="color:${isWin ? '#22c55e' : '#ef4444'};font-size:11px;">${isWin ? '+' : '-'}${Math.abs(winAmt - bet)}</span>
  `;
  list.insertBefore(item, list.firstChild);
  if (list.children.length > 22) list.removeChild(list.lastChild);
}

function addChat(name, msg, color, highlight) {
  const feed = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (highlight ? ' highlight' : '');
  if (highlight) div.style.setProperty('--msg-color', color);
  div.innerHTML = `<span class="cn" style="color:${color}">${name}:</span><span class="ct">${msg}</span>`;
  feed.insertBefore(div, feed.firstChild);
  if (feed.children.length > 35) feed.removeChild(feed.lastChild);
}

function fakeChatMsg() {
  const name = FAKE_NAMES[Math.floor(Math.random() * FAKE_NAMES.length)];
  const color = NAME_COLORS[name.charCodeAt(0) % NAME_COLORS.length];
  const mults = [1.2, 2, 3, 5, 8, 10, 20, 50, 100];
  const m = mults[Math.floor(Math.random() * mults.length)];
  const tmpl = CHAT_TEMPLATES[Math.floor(Math.random() * CHAT_TEMPLATES.length)];
  const { msg, hot } = tmpl(name, m);
  addChat(name, msg, color, hot);

  const cur = parseInt(document.getElementById('online-num').textContent) || 247;
  const delta = Math.floor((Math.random() - 0.4) * 5);
  const newCount = Math.max(100, cur + delta);
  document.getElementById('online-num').textContent = newCount;
  document.getElementById('online-count').textContent = newCount + ' online';

  setTimeout(fakeChatMsg, 1200 + Math.random() * 2800);
}

function showFlash(txt, color) {
  const fl = document.getElementById('win-flash');
  const t = document.getElementById('wf-txt');
  t.textContent = txt;
  t.style.color = color;
  t.style.textShadow = `0 0 60px ${color}`;
  fl.classList.add('show');
  setTimeout(() => fl.classList.remove('show'), 750);
}

const STREAK_COLORS = ['#f43f5e','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899','#10b981','#fbbf24'];
function updateStreak() {
  const dots = document.getElementById('streak-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'sdot' + (i < streak ? ' filled' : '');
    if (i < streak) { d.style.background = STREAK_COLORS[i]; d.style.color = STREAK_COLORS[i]; }
    dots.appendChild(d);
  }
  document.getElementById('streak-label').textContent =
    freeDrops > 0 ? `${freeDrops} FREE drop(s) ready! 🎁` : `${10 - streak} more drops → FREE drop`;
}

function updateUI() {
  document.getElementById('bal-txt').textContent = balance.toLocaleString();
  document.getElementById('jackpot-amount').textContent = jackpot.toLocaleString();
}

function adjBet(val, mult) {
  const inp = document.getElementById('bet-input');
  let cur = parseInt(inp.value) || 0;
  inp.value = mult
    ? Math.max(1, Math.min(balance, Math.round(cur * val)))
    : Math.max(1, Math.min(balance, cur + val));
}
function setBetVal(v) { document.getElementById('bet-input').value = Math.max(1, Math.floor(v)); }

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('auto-toggle').classList.toggle('on', autoMode);
  if (autoMode) autoTimer = setInterval(dropBall, 1300);
  else clearInterval(autoTimer);
}

document.querySelectorAll('.risk-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    risk = btn.dataset.risk;
    buildBucketRow();
    drawBoard();
  };
});

setTimeout(() => addChat('System', 'Welcome to PLINKO! Drop your first ball 🎰', '#fbbf24', true), 300);
setTimeout(fakeChatMsg, 1500);
setTimeout(() => addChat('Lucky777', 'just hit 50× on HIGH risk 😱', NAME_COLORS[0], true), 2200);
setTimeout(() => addChat('MoonShot', 'this game is insane lol', NAME_COLORS[3], false), 3500);

updateStreak();
updateUI();
window.addEventListener('resize', resize);
resize();
</script>
